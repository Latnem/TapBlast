/* ===== STUDENT MOBILE PHASE FORCE PATCH ===== */
(function(){
  window.tapblastForceStudentVisible = function(){
    try{
      var join = document.getElementById('student-join-screen');
      var screen = document.getElementById('student-screen');
      if(join) join.classList.remove('active');
      if(screen){
        screen.classList.remove('hidden');
        screen.classList.add('active');
        screen.style.display='flex';
        screen.style.visibility='visible';
        screen.style.opacity='1';
      }
      document.body.setAttribute('data-screen','student-screen');
      ['studentPhase','studentQuestion','studentQuestionProgress','studentAnswerGrid','studentResult'].forEach(function(id){
        var el=document.getElementById(id);
        if(el){
          el.classList.remove('hidden');
          el.style.display='';
          el.style.visibility='visible';
          el.style.opacity='1';
        }
      });
    }catch(e){}
  };

  window.tapblastStudentLoadingFallback = function(message){
    try{
      tapblastForceStudentVisible();
      var phase=document.getElementById('studentPhase');
      var q=document.getElementById('studentQuestion');
      var grid=document.getElementById('studentAnswerGrid');
      if(phase) phase.textContent='Connected';
      if(q) q.textContent=message || 'Waiting for the question to appear…';
      if(grid) grid.innerHTML='';
    }catch(e){}
  };
})();

</script>

<style>
*{box-sizing:border-box}

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCjh16vsvzWmt9dUkH6O4brRf8hfTOhzYA",
  authDomain: "tapblast-8e13a.firebaseapp.com",
  projectId: "tapblast-8e13a",
  databaseURL: "https://tapblast-8e13a-default-rtdb.firebaseio.com",
  storageBucket: "tapblast-8e13a.firebasestorage.app",
  messagingSenderId: "1069456061706",
  appId: "1:1069456061706:web:0fc650dfac4de09de536f3",
  measurementId: "G-QLTZFNLH2X"
};
if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ROOT='tapblast_clean_v1';
const $ = id => document.getElementById(id);
const roomRef=code=>db.ref(`${ROOT}/rooms/${code}`);
const answerColors=['blue','green','orange','yellow'];
const answerShapes=['A','B','C','D'];
const avatarAnimals=['🐶','🐱','🦊','🐼','🐯','🦁','🐸','🐵','🐧','🦉','🐢','🦄'];
const avatarColors=['#2563eb','#16a34a','#f97316','#dc2626','#7c3aed','#0891b2','#ca8a04','#db2777'];
let selectedStudentAvatar=avatarAnimals[0];
let selectedStudentColor=avatarColors[0];
let studentPlayerId=null;
let currentStudentRoomCode=null;
let studentLastRoomSnapshot=null;
let studentRoomUnsub=null;

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $(id).classList.add('active');
  document.body.setAttribute('data-screen',id);
}
function esc(value){
  return String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function cleanupStudent(){
  if(studentRoomUnsub){
    studentRoomUnsub();
    studentRoomUnsub=null;
  }
}
function sortedPlayers(room){
  return Object.entries(room.players||{})
    .map(([id,p])=>({id,...p}))
    .sort((a,b)=>(Number(b.score||0)-Number(a.score||0)) || String(a.name||'').localeCompare(String(b.name||'')));
}
function playerAnsweredCurrent(player,room){
  return player && player.answerQ===room.currentQ && (typeof player.currentAnswerIndex==='number' || typeof player.currentTypedAnswer==='string');
}
function displayAnswersFor(room,q){
  const answers=(q.answers||[]).map((a,i)=>({index:i,...a}));
  const order=Array.isArray(room.answerOrder) ? room.answerOrder : null;
  if(order && order.length) return order.map(i=>answers[i]).filter(Boolean);
  return answers;
}
function renderAvatarPicker(){
  $('avatarAnimalGrid').innerHTML=avatarAnimals.map(a=>`<button type="button" class="avatar-animal ${a===selectedStudentAvatar?'active':''}" data-avatar-animal="${a}">${a}</button>`).join('');
  $('avatarColorGrid').innerHTML=avatarColors.map(c=>`<button type="button" class="avatar-color ${c===selectedStudentColor?'active':''}" style="background:${c}" data-avatar-color="${c}" aria-label="Avatar color"></button>`).join('');
  document.querySelectorAll('[data-avatar-animal]').forEach(btn=>btn.onclick=()=>{
    selectedStudentAvatar=btn.dataset.avatarAnimal;
    renderAvatarPicker();
  });
  document.querySelectorAll('[data-avatar-color]').forEach(btn=>btn.onclick=()=>{
    selectedStudentColor=btn.dataset.avatarColor;
    renderAvatarPicker();
  });
}
async function studentJoin(){
  const code=($('studentCode').value||'').replace(/\D/g,'').slice(0,6);
  currentStudentRoomCode=code;
  const name=($('studentName').value||'').trim().slice(0,20);
  const btn=$('studentJoinBtn');
  $('studentJoinError').textContent='';

  if(!code){ $('studentJoinError').textContent='Enter the 6-digit room code'; return; }
  if(!name){ $('studentJoinError').textContent='Pick a nickname'; return; }

  btn.disabled=true;
  const oldBtnText=btn.innerHTML;
  btn.innerHTML='<span class="material-symbols-outlined">hourglass_top</span>Joining…';

  try{
    const ref=roomRef(code);

    const roomSnap=await ref.once('value');
    if(!roomSnap.exists()){
      $('studentJoinError').textContent='Room not found. Check the code and try again.';
      return;
    }

    const room=roomSnap.val()||{};
    if(room.phase==='ended'){
      $('studentJoinError').textContent='This game has ended.';
      return;
    }

    studentPlayerId=sessionStorage.getItem('tapblast_player_'+code)||db.ref().push().key;
    sessionStorage.setItem('tapblast_player_'+code, studentPlayerId);

    const existingPlayer=(room.players||{})[studentPlayerId]||{};
    const newPlayerData={
      name:name,
      joinedAt: existingPlayer.joinedAt || Date.now(),
      lastSeenAt: firebase.database.ServerValue.TIMESTAMP,
      currentAnswerIndex: (typeof existingPlayer.currentAnswerIndex==='number') ? existingPlayer.currentAnswerIndex : null,
      currentTypedAnswer: (typeof existingPlayer.currentTypedAnswer==='string') ? existingPlayer.currentTypedAnswer : null,
      answerAt: existingPlayer.answerAt || 0,
      answerQ: (typeof existingPlayer.answerQ==='number') ? existingPlayer.answerQ : -1,
      lastDelta: existingPlayer.lastDelta || 0,
      streak: existingPlayer.streak || 0,
      streakMsg: existingPlayer.streakMsg || '',
      score: (typeof existingPlayer.score==='number') ? existingPlayer.score : 0,
      avatarEmoji:selectedStudentAvatar,
      avatarColor:selectedStudentColor
    };

    await ref.child('players').child(studentPlayerId).update(newPlayerData);

    const playerSnap=await ref.child('players').child(studentPlayerId).once('value');
    if(!playerSnap.exists()){
      $('studentJoinError').textContent='Join failed. Try again.';
      return;
    }

    showScreen('student-screen');
    $('studentPhase').textContent='Connected';
    $('studentQuestion').textContent='Loading game…';
    $('studentAnswerGrid').innerHTML='';
    $('studentTopName').textContent=name;
    $('studentTopScore').textContent=String(newPlayerData.score||0);

    const freshSnap=await ref.once('value');
    const freshRoom=freshSnap.val()||room;
    const freshPlayer=((freshRoom.players||{})[studentPlayerId])||newPlayerData;
    try{ renderStudent(freshRoom,freshPlayer); }catch(renderErr){ console.error('Immediate render failed:', renderErr); }

    startStudentListener(code);

    setTimeout(async()=>{
      try{
        const currentText=($('studentQuestion').textContent||'').toLowerCase();
        const phaseText=($('studentPhase').textContent||'').toLowerCase();
        if(currentText.includes('loading') || phaseText.includes('joining') || phaseText.includes('connected')){
          const retrySnap=await ref.once('value');
          if(retrySnap.exists()){
            const retryRoom=retrySnap.val()||{};
            const retryPlayer=((retryRoom.players||{})[studentPlayerId]);
            if(retryPlayer) renderStudent(retryRoom,retryPlayer);
          }
        }
      }catch(e){ console.error('Mobile retry render failed:', e); }
    }, 2000);

  }catch(err){
    console.error('Join failed:', err);
    $('studentJoinError').textContent='Could not join. Check internet connection and try again.';
    showScreen('student-join-screen');
  }finally{
    btn.disabled=false;
    btn.innerHTML=oldBtnText;
  }
}
function startStudentListener(code){
  cleanupStudent();
  currentStudentRoomCode=code;
  const ref=roomRef(code);
  try{ ref.keepSynced(true); }catch(e){}

  const cb=snap=>{
    try{
      if(!snap.exists()) return renderStudentEnded('Game ended');
      const room=snap.val()||{};
      studentLastRoomSnapshot=room;
      const player=(room.players||{})[studentPlayerId];
      if(!player){
        $('studentPhase').textContent='Connected';
        $('studentQuestion').textContent='Player profile is loading…';
        $('studentAnswerGrid').innerHTML='';
        return;
      }
      showScreen('student-screen');
      renderStudent(room,player);
    }catch(err){
      console.error('Student listener render failed:', err);
      showScreen('student-screen');
      $('studentPhase').textContent='Connected';
      $('studentQuestion').textContent='Game data is loading. Refresh if it stays here.';
      $('studentAnswerGrid').innerHTML='';
    }
  };

  ref.on('value',cb,err=>{
    console.error('Student listener connection failed:', err);
    $('studentPhase').textContent='Connection issue';
    $('studentQuestion').textContent='Could not connect to the live game. Refresh and rejoin.';
  });
  studentRoomUnsub=()=>ref.off('value',cb);
}
function renderStudentEnded(msg){

  $('studentQuestionProgress').textContent='';
  $('studentMedia').innerHTML='';
  $('studentQuestion').textContent='';
  $('studentAnswerGrid').innerHTML='';
  $('studentResult').textContent='';
}

function renderStudent(room,player){
  if(window.tapblastForceStudentVisible) tapblastForceStudentVisible();
  $('studentTopName').textContent=player.name||'Player';
  $('studentTopScore').textContent=String(player.score||0);
  $('studentQuestionProgress').textContent='';
  $('studentWaitingProfile').classList.add('hidden');
  $('studentWaitingProfile').style.display='none';

  if(room.phase==='lobby'){
    $('studentPhase').textContent='Waiting Room';
    $('studentMedia').innerHTML='';
    $('studentQuestion').textContent='You are in! The game will start soon.';
    $('studentAnswerGrid').innerHTML='';
    $('studentResult').textContent='';
    $('studentWaitingProfile').classList.remove('hidden');
    $('studentWaitingProfile').style.display='block';
    renderWaitingProfilePicker(player);
    return;
  }
  if(room.phase==='ended') return renderStudentEnded('Game ended');
  if(room.phase==='leaderboard'){
    $('studentPhase').textContent='Scoreboard';
    $('studentMedia').innerHTML='';
    $('studentQuestion').textContent='Get ready for the next question…';
    $('studentAnswerGrid').innerHTML='';
    $('studentResult').textContent=player.lastDelta?'+'+player.lastDelta+' pts':'';
    return;
  }
  if(room.phase==='final'){
    $('studentPhase').textContent='Final Scores';
    $('studentMedia').innerHTML='';
    $('studentQuestion').textContent=`Your final score: ${player.score||0}`;
    const finalPlayers=sortedPlayers(room);
    $('studentAnswerGrid').innerHTML=finalPlayers.map((p,i)=>`
      <div class="student-final-row ${p.id===studentPlayerId?'me':''}">
        <span>${i+1}. ${esc(p.name||'Player')}</span>
        <strong>${Number(p.score||0)} pts</strong>
      </div>`).join('');
    $('studentResult').textContent='';
    return;
  }
  if(room.phase==='countdown'){
    $('studentPhase').textContent='Get Ready!';
    $('studentMedia').innerHTML='';
    $('studentQuestion').textContent='Next question starting…';
    $('studentAnswerGrid').innerHTML='';
    $('studentResult').textContent='';
    return;
  }

  const activeQuestionPhases=['question','answers','question_media','question_answers','paused','locked','answer_results','results'];
  if(!activeQuestionPhases.includes(room.phase)){
    $('studentPhase').textContent='Waiting';
    $('studentMedia').innerHTML='';
    $('studentQuestion').textContent='Please wait for the host.';
    $('studentAnswerGrid').innerHTML='';
    $('studentResult').textContent='';
    return;
  }

  const questions=(room.quiz&&Array.isArray(room.quiz.questions))?room.quiz.questions:[];
  const q=questions[room.currentQ];
  if(!q){
    $('studentPhase').textContent='Connected';
    $('studentMedia').innerHTML='';
    $('studentQuestion').textContent='You are in. Waiting for the next question to load…';
    $('studentAnswerGrid').innerHTML='';
    $('studentResult').textContent='';
    return;
  }
  const totalQuestions=questions.length;
  $('studentQuestionProgress').textContent='Question '+((room.currentQ||0)+1)+'/'+totalQuestions;
  const isTypeQuestion=(q.type==='type');
  $('studentQuestion').textContent=q.text||'';
  $('studentMedia').innerHTML='';
  if(q.media){
    if(q.media.type==='video') $('studentMedia').innerHTML=`<video src="${q.media.dataUrl}" ${room.phase==='question_media'?'autoplay controls':''}></video>`;
    else $('studentMedia').innerHTML=`<img src="${q.media.dataUrl}" alt="">`;
  }
  if(room.phase==='question_media'){
    $('studentPhase').textContent='Watch';
    $('studentAnswerGrid').innerHTML='';
    $('studentResult').textContent='';
    return;
  }

  $('studentPhase').textContent=
    room.phase==='paused'?'Paused':
    room.phase==='locked'?"Time's up — results coming":
    (room.phase==='answer_results'||room.phase==='results')?(player.lastCorrect?'Correct!':'Answer revealed'):
    isTypeQuestion?'Type your answer':'Tap your answer';

  const hasAnswered = playerAnsweredCurrent(player,room);

  if(isTypeQuestion){
    if((room.phase==='question_answers'||room.phase==='answers'||room.phase==='question') && !hasAnswered){
      $('studentAnswerGrid').innerHTML=`
        <div class="student-type-wrap">
          <input id="studentTypedAnswer" type="text" placeholder="Type answer" autocomplete="off">
          <button id="studentTypeSubmit" type="button" class="btn accent">Submit</button>
        </div>`;
      $('studentTypeSubmit').onclick=async()=>{
        const value=($('studentTypedAnswer')?.value||'').trim();
        if(!value) return;
        await roomRef(room.code||currentStudentRoomCode).child('players').child(studentPlayerId).update({
          currentTypedAnswer:value,
          answerAt:firebase.database.ServerValue.TIMESTAMP,
          answerQ:room.currentQ,
          currentAnswerIndex:null
        });
      };
      $('studentTypedAnswer').addEventListener('keydown',e=>{
        if(e.key==='Enter') $('studentTypeSubmit').click();
      });
    }else{
      $('studentAnswerGrid').innerHTML=`
        <div class="student-type-result">
          ${(room.phase==='answer_results'||room.phase==='results')?`Correct answer: <strong>${esc(q.typeAnswer||'')}</strong>`:(hasAnswered?'Answer locked':'')}
        </div>`;
    }
  }else{
    const answers=displayAnswersFor(room,q);
    $('studentAnswerGrid').innerHTML=answers.map((a,idx)=>{
      const isSelected = hasAnswered && player.currentAnswerIndex===a.index;
      const isLocked = room.phase!=='question_answers' || hasAnswered;
      const isReveal=(room.phase==='answer_results'||room.phase==='results');
      const isSelectedCorrect=isReveal && isSelected && a.index===q.correctIndex;
      const isWrongSelected=isReveal && isSelected && a.index!==q.correctIndex;
      const isCorrectAnswer=isReveal && a.index===q.correctIndex;
      return `<button type="button" class="student-answer ${answerColors[idx%4]} ${isSelected?'selected':''} ${isLocked?'locked':''} ${isSelectedCorrect?'correct-reveal':''} ${isWrongSelected?'wrong-selected':''} ${isCorrectAnswer?'correct-answer-reveal':''}" data-answer-index="${a.index}">
        <span class="student-answer-shape">${answerShapes[idx]}</span>
        ${a.media?`<span class="thumb">${a.media.type==='video'?`<video src="${a.media.dataUrl}" muted playsinline></video>`:`<img src="${a.media.dataUrl}">`}</span>`:''}
        ${a.text?`<span class="label-text">${esc(a.text)}</span>`:''}
      </button>`;
    }).join('');
    $('studentAnswerGrid').querySelectorAll('[data-answer-index]').forEach(btn=>btn.onclick=async()=>{
      if(room.phase!=='question_answers') return;
      if(hasAnswered) return;
      const idx=parseInt(btn.dataset.answerIndex,10);
      await roomRef(room.code||currentStudentRoomCode).child('players').child(studentPlayerId).update({
        currentAnswerIndex:idx,
        currentTypedAnswer:null,
        answerAt:firebase.database.ServerValue.TIMESTAMP,
        answerQ:room.currentQ
      });
    });
  }

  if((room.phase==='answer_results'||room.phase==='results')){
    const deltaText='+'+Number(player.lastDelta||0)+' pts';
    $('studentResult').textContent=deltaText+(player.streakMsg?' '+player.streakMsg:'');
  }else{
    $('studentResult').textContent=hasAnswered && (room.phase==='question_answers'||room.phase==='answers'||room.phase==='question') ? 'Locked in — waiting for others' : '';
  }
}

      };
    });

    if($tb('studentResult')) $tb('studentResult').textContent = hasAnswered && !reveal ? 'Locked in — waiting for others' : (reveal && player && player.lastDelta ? '+'+player.lastDelta+' pts' : '');
  }
  async function joinNow(){
    var codeEl=$tb('studentCode'), nameEl=$tb('studentName'), err=$tb('studentJoinError'), btn=$tb('studentJoinBtn');
    var code=(codeEl&&codeEl.value||'').replace(/\D/g,'').slice(0,6);
    var name=(nameEl&&nameEl.value||'').trim().slice(0,20);
    fallbackRoomCode=code;
    if(err) err.textContent='';
    if(!code){ if(err) err.textContent='Enter the 6-digit room code'; return; }
    if(!name){ if(err) err.textContent='Pick a nickname'; return; }
    if(btn) btn.disabled=true;
    try{
      var r=ref(code);
      var snap=await r.once('value');
      if(!snap.exists()){ if(err) err.textContent='Room not found. Check the code and try again.'; return; }
      var room=snap.val()||{};
      fallbackPlayerId=sessionStorage.getItem('tapblast_player_'+code) || tbDb.ref().push().key;
      sessionStorage.setItem('tapblast_player_'+code, fallbackPlayerId);
      var existing=(room.players||{})[fallbackPlayerId]||{};
      var playerData={
        name:name,
        score: typeof existing.score==='number'?existing.score:0,
        joinedAt: existing.joinedAt || Date.now(),
        lastSeenAt: firebase.database.ServerValue.TIMESTAMP,
        currentAnswerIndex: typeof existing.currentAnswerIndex==='number'?existing.currentAnswerIndex:null,
        currentTypedAnswer: typeof existing.currentTypedAnswer==='string'?existing.currentTypedAnswer:null,
        answerAt: existing.answerAt || 0,
        answerQ: typeof existing.answerQ==='number'?existing.answerQ:-1,
        lastDelta: existing.lastDelta || 0,
        streak: existing.streak || 0,
        streakMsg: existing.streakMsg || '',
        avatarEmoji: window.selectedStudentAvatar || '🐶',
        avatarColor: window.selectedStudentColor || '#2563eb'
      };
      await r.child('players').child(fallbackPlayerId).update(playerData);
      forceStudentScreen();
      if($tb('studentPhase')) $tb('studentPhase').textContent='Connected';
      if($tb('studentQuestion')) $tb('studentQuestion').textContent='Loading game…';

      var fresh=await r.once('value');
      var freshRoom=fresh.val()||room;
      var freshPlayer=((freshRoom.players||{})[fallbackPlayerId])||playerData;
      render(freshRoom,freshPlayer);

      if(fallbackUnsub) fallbackUnsub();
      var cb=function(s){
        if(!s.exists()) return;
        var rm=s.val()||{};
        var pl=((rm.players||{})[fallbackPlayerId]);
        if(pl) render(rm,pl);
      };
      r.on('value',cb);
      fallbackUnsub=function(){r.off('value',cb);};
    }catch(e){
      console.error('Fallback join failed', e);
      if(err) err.textContent='Could not join. Refresh and try again.';
      var join=$tb('student-join-screen'); if(join){join.classList.add('active'); join.style.display='flex';}
      var screen=$tb('student-screen'); if(screen){screen.classList.remove('active'); screen.style.display='none';}
      document.body.setAttribute('data-screen','student-join-screen');
    }finally{
      if(btn) btn.disabled=false;
    }
  }
  document.addEventListener('DOMContentLoaded',function(){
    var btn=$tb('studentJoinBtn');
    if(btn){
      btn.onclick=function(e){ e.preventDefault(); joinNow(); };
    }
    var code=$tb('studentCode'), name=$tb('studentName');
    if(code) code.addEventListener('keydown',function(e){ if(e.key==='Enter') joinNow(); });
    if(name) name.addEventListener('keydown',function(e){ if(e.key==='Enter') joinNow(); });
  });
})();

</script>
