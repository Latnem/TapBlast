
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TapBlast – Join</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Roboto,sans-serif;background:#eef2f6;color:#1f2937;min-height:100vh}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.shell{width:100%;max-width:1040px;display:grid;grid-template-columns:1.02fr .98fr;gap:24px}
.hero,.card{background:#fff;border:1px solid #dde4ee;border-radius:28px;box-shadow:0 12px 38px rgba(15,23,42,.07)}
.hero{padding:38px;background:linear-gradient(145deg,#1f2f57,#3f6db5);color:#fff;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;right:-70px;bottom:-70px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.08)}
.brand{font-size:2.4rem;font-weight:900;margin-bottom:12px}
.brand em{font-style:normal;color:#F2994A}
.card{padding:28px}
label{display:block;font-size:.78rem;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#6b7280;margin-bottom:6px}
input{width:100%;padding:14px 14px;border:1px solid #dde4ee;border-radius:14px;outline:none;margin-bottom:14px}
input:focus{border-color:#3f6db5;box-shadow:0 0 0 3px rgba(63,109,181,.1)}
button{width:100%;border:none;border-radius:14px;padding:13px 16px;background:#3f6db5;color:#fff;font-weight:700;cursor:pointer}
@media(max-width:860px){.shell{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="shell">
    <section class="hero"><div class="brand">Tap<em>Blast</em></div></section>
    <section class="card">
      <label for="roomCode">Room Code</label>
      <input id="roomCode" type="text" maxlength="6" inputmode="numeric">
      <label for="nickname">Nickname</label>
      <input id="nickname" type="text" maxlength="20">
      <button id="joinBtn" type="button">Join</button>
    </section>
  </div>
</div>
<script>
(function prefill(){
  const params = new URLSearchParams(location.search);
  const code = (params.get('code') || '').replace(/\D/g,'').slice(0,6);
  const name = (params.get('name') || '').slice(0,20);
  if(code) document.getElementById('roomCode').value = code;
  if(name) document.getElementById('nickname').value = name;
})();
function goJoin(){
  const code = (document.getElementById('roomCode').value || '').replace(/\D/g,'').slice(0,6);
  const name = (document.getElementById('nickname').value || '').trim().slice(0,20);
  const q = new URLSearchParams();
  if(code) q.set('code', code);
  if(name) q.set('name', name);
  location.href = 'https://latnem.github.io/TapBlast/index.html' + (q.toString() ? '?' + q.toString() : '') + '#student-join';
}
document.getElementById('joinBtn').addEventListener('click', goJoin);
document.getElementById('roomCode').addEventListener('keydown', e => { if(e.key === 'Enter') goJoin(); });
document.getElementById('nickname').addEventListener('keydown', e => { if(e.key === 'Enter') goJoin(); });
</script>
</body>
</html>
