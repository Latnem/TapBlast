<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TapBlast Join</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Fraunces:opsz,wght@9..144,800;9..144,900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
:root{
  --royal-900:#0f2050;
  --royal-700:#1e3a8a;
  --royal-600:#2447a8;
  --sky-100:#dbeafe;
  --line:#e3e8f4;
  --sun-400:#facc15;
}
html,body{height:100%}
body{
  margin:0;
  font-family:'Plus Jakarta Sans',system-ui,sans-serif;
  background:
    radial-gradient(900px 500px at 15% 15%, rgba(59,130,246,.18), transparent 60%),
    radial-gradient(700px 400px at 85% 85%, rgba(250,204,21,.12), transparent 60%),
    linear-gradient(160deg, #0b1733 0%, #15306e 55%, #1e3a8a 100%);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.card{
  width:100%;
  max-width:420px;
  background:#fff;
  border:1px solid var(--line);
  border-radius:26px;
  padding:28px 22px;
  box-shadow:0 20px 50px rgba(0,0,0,.28);
}
.brand{
  font-family:'Fraunces',serif;
  font-size:2rem;
  font-weight:900;
  text-align:center;
  color:var(--royal-900);
  margin:0 0 22px;
  letter-spacing:-.02em;
}
.brand em{font-style:italic;color:var(--sun-400)}
input{
  width:100%;
  padding:14px 15px;
  border:1.5px solid var(--line);
  border-radius:14px;
  outline:none;
  font:inherit;
  margin-bottom:12px;
}
input:focus{
  border-color:#3b82f6;
  box-shadow:0 0 0 4px var(--sky-100);
}
button{
  width:100%;
  border:none;
  border-radius:14px;
  padding:14px 16px;
  font:inherit;
  font-weight:800;
  cursor:pointer;
  color:#fff;
  background:linear-gradient(180deg, var(--royal-600), var(--royal-700));
}
button:hover{filter:brightness(1.05)}
@media(max-width:480px){
  body{padding:12px}
  .card{padding:22px 16px;border-radius:20px}
  .brand{font-size:1.7rem}
}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">Tap<em>Blast</em></div>
    <input id="roomCode" type="text" placeholder="Room Code" maxlength="6" inputmode="numeric">
    <input id="nickname" type="text" placeholder="Nickname" maxlength="20">
    <button id="joinBtn" type="button">Join</button>
  </div>
<script>
(function(){
  const p = new URLSearchParams(location.search);
  const code = (p.get('code')||'').replace(/\D/g,'').slice(0,6);
  const name = (p.get('name')||'').slice(0,20);
  if(code) document.getElementById('roomCode').value = code;
  if(name) document.getElementById('nickname').value = name;
})();
function goJoin(){
  const code=(document.getElementById('roomCode').value||'').replace(/\D/g,'').slice(0,6);
  const name=(document.getElementById('nickname').value||'').trim().slice(0,20);
  const q=new URLSearchParams();
  if(code) q.set('code', code);
  if(name) q.set('name', name);
  location.href='https://latnem.github.io/TapBlast/join/'+(q.toString()?'?'+q.toString():'');
}
document.getElementById('joinBtn').onclick = goJoin;
document.getElementById('roomCode').onkeydown = e => { if(e.key==='Enter') goJoin(); };
document.getElementById('nickname').onkeydown = e => { if(e.key==='Enter') goJoin(); };
</script>
</body>
</html>
