<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TapBlast – Join</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box}body{margin:0;font-family:'Nunito',sans-serif;background:#f5f6f8;color:#1f2f57;min-height:100vh}.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}.shell{width:100%;max-width:980px;display:grid;grid-template-columns:1.05fr .95fr;gap:24px}.hero,.card{background:#fff;border-radius:28px;border:1px solid #e7e8ee;box-shadow:0 12px 38px rgba(0,0,0,.08)}.hero{padding:38px;background:linear-gradient(145deg,#1f2f57,#3f6db5);color:#fff}.brand{font-size:2.4rem;font-weight:900;margin-bottom:12px}.brand em{font-style:normal;color:#f0b323}.hero h2{margin:0 0 10px;font-size:2rem}.card{padding:30px}label{display:block;font-size:.78rem;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:#5b6278;margin-bottom:6px}input{width:100%;padding:15px 16px;border-radius:14px;border:2px solid #e0e2e8;font:inherit;margin-bottom:14px;outline:none}input:focus{border-color:#3f6db5;box-shadow:0 0 0 3px rgba(63,109,181,.12)}.btn{width:100%;display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:14px;padding:14px 18px;font:inherit;font-weight:900;cursor:pointer;background:#3f6db5;color:#fff}@media(max-width:860px){.shell{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap"><div class="shell"><section class="hero"><div class="brand">Tap<em>Blast</em></div><h2>Join a live room.</h2></section><section class="card"><label for="roomCode">Room Code</label><input id="roomCode" type="text" maxlength="6" inputmode="numeric"/><label for="nickname">Nickname</label><input id="nickname" type="text" maxlength="20"/><button id="joinBtn" class="btn" type="button">Join</button></section></div></div>
<script>
(function prefill(){const params=new URLSearchParams(location.search); const code=(params.get('code')||'').replace(/\D/g,'').slice(0,6); const name=(params.get('name')||'').slice(0,20); if(code) document.getElementById('roomCode').value=code; if(name) document.getElementById('nickname').value=name})();
function goJoin(){const code=(document.getElementById('roomCode').value||'').replace(/\D/g,'').slice(0,6); const name=(document.getElementById('nickname').value||'').trim().slice(0,20); const q=new URLSearchParams(); if(code) q.set('code',code); if(name) q.set('name',name); location.href='../index.html'+(q.toString()?'?'+q.toString():'')+'#student-join'}
document.getElementById('joinBtn').addEventListener('click',goJoin); document.getElementById('roomCode').addEventListener('keydown',e=>{if(e.key==='Enter')goJoin()}); document.getElementById('nickname').addEventListener('keydown',e=>{if(e.key==='Enter')goJoin()});
</script>
</body>
</html>
