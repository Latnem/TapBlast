
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TapBlast Teacher</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Material+Symbols+Outlined" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box}
:root{
  --bg:#eef2f6; --panel:#ffffff; --panel-soft:#f8fafc; --line:#dde4ee; --text:#1f2937; --muted:#6b7280;
  --brand:#3f6db5; --brand-dark:#1f2f57; --blue:#2D8CFF; --green:#27AE60; --orange:#F2994A; --yellow:#F2C94C;
  --danger:#c0392b; --success:#1f8f3a;
}
html,body{height:100%}
body{margin:0;font-family:Roboto,sans-serif;background:var(--bg);color:var(--text)}
button,input,textarea,select{font:inherit}
.hidden{display:none!important}
.screen{display:none;min-height:100vh}
.screen.active{display:flex}
.boot-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.boot-mark{font-size:2rem;font-weight:900;color:var(--brand-dark)}
.boot-mark em{font-style:normal;color:var(--orange)}
.app-shell{display:flex;justify-content:center;width:100%;min-height:100vh;background:var(--bg)}
.app-container{display:grid;grid-template-columns:270px 1fr;max-width:1440px;width:100%;min-height:100vh;background:var(--panel);border-left:1px solid var(--line);border-right:1px solid var(--line);box-shadow:0 10px 35px rgba(31,41,55,.05)}
.left-pane{background:var(--panel-soft);border-right:1px solid var(--line);padding:18px 16px}
.main-pane{display:flex;flex-direction:column;min-width:0}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 22px;background:linear-gradient(135deg,var(--brand-dark),var(--brand));color:#fff}
.brand{font-size:1.8rem;font-weight:900;line-height:1}
.brand em{font-style:normal;color:var(--yellow)}
.subtle{font-size:.85rem;opacity:.84}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:14px;padding:11px 16px;font-weight:700;cursor:pointer;transition:.16s ease}
.btn:hover{transform:translateY(-1px)}
.btn.primary{background:var(--brand);color:#fff}
.btn.outline{background:#fff;color:var(--text);border:1px solid var(--line)}
.btn.ghost{background:transparent;color:var(--muted)}
.btn.danger{background:var(--danger);color:#fff}
.btn.icon{width:40px;height:40px;padding:0;border-radius:50%}
.field{margin-bottom:14px}
label{display:block;font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.45px;color:var(--muted);margin-bottom:6px}
input[type=text],input[type=number],textarea,select{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--text);outline:none}
input[type=text]:focus,input[type=number]:focus,textarea:focus,select:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(63,109,181,.1)}
textarea{resize:vertical;min-height:88px}
.content-wrap{padding:20px 22px}
.center-card{width:100%;max-width:430px;background:#fff;border:1px solid var(--line);border-radius:26px;box-shadow:0 18px 45px rgba(15,23,42,.08);padding:34px 28px;text-align:center}
.center-stage{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-brand{font-size:2rem;font-weight:900}
.login-brand em{font-style:normal;color:var(--orange)}
.folder-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.folder-list{display:flex;flex-direction:column;gap:6px}
.folder-item{display:flex;align-items:center;gap:10px;padding:12px 12px;border-radius:14px;cursor:pointer;border:1px solid transparent}
.folder-item.active,.folder-item:hover{background:#eef3fb;border-color:#d8e5ff}
.folder-item.drop-target{background:#e6f0ff;border-color:#8bb3ff}
.folder-name{flex:1;font-weight:700}
.search-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.search-row input{max-width:360px}
.quiz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.quiz-card{background:#fff;border:1px solid var(--line);border-radius:22px;overflow:hidden;box-shadow:0 4px 18px rgba(15,23,42,.04)}
.quiz-card.dragging{opacity:.55}
.quiz-cover{height:120px;background:#edf3fb;display:flex;align-items:center;justify-content:center;overflow:hidden}
.quiz-cover img{width:100%;height:100%;object-fit:cover}
.quiz-cover .material-symbols-outlined{font-size:42px;color:#90a4c3}
.quiz-body{padding:14px 14px 12px}
.quiz-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px}
.quiz-title{font-size:1rem;font-weight:900;line-height:1.3;margin:0}
.quiz-meta{font-size:.85rem;color:var(--muted);margin-bottom:12px}
.quiz-actions{display:flex;gap:8px}
.quiz-actions .btn{flex:1}
.menu-wrap{position:relative}
.menu-btn{width:40px;height:40px;border:none;border-radius:50%;background:#fff;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center}
.menu-btn:hover{background:#f3f5f8}
.menu-pop{position:absolute;right:0;top:44px;background:#fff;border:1px solid var(--line);border-radius:16px;min-width:190px;box-shadow:0 16px 35px rgba(15,23,42,.16);padding:6px;z-index:50}
.menu-pop button{display:flex;align-items:center;gap:10px;width:100%;border:none;background:#fff;padding:10px 12px;border-radius:12px;cursor:pointer;text-align:left}
.menu-pop button:hover{background:#f5f8ff}
.panel{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px}
.editor-shell{display:grid;grid-template-columns:290px 1fr;min-height:calc(100vh - 78px)}
.editor-left{background:var(--panel-soft);border-right:1px solid var(--line);padding:16px}
.question-list{display:flex;flex-direction:column;gap:10px;padding:4px}
.question-card{position:relative;background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px 14px 12px 20px;cursor:pointer}
.question-card::before{content:'⋮⋮';position:absolute;left:6px;top:10px;color:#90a4c3;font-size:13px}
.question-card.active{background:#eef3fb;border-color:#b9d0ff}
.media-drop{border:2px dashed #bfd0e5;background:#f8fbff;border-radius:18px;padding:22px;text-align:center;cursor:pointer}
.media-drop.drag{background:#eef5ff;border-color:#76a7ff}
.media-preview{margin-top:12px}
.media-preview img,.media-preview video{max-width:100%;max-height:220px;border-radius:14px}
.answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.answer-edit{border:1px solid var(--line);border-radius:18px;background:#fbfcfe;padding:12px}
.answer-edit .top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.answer-media-preview img,.answer-media-preview video{max-width:100%;max-height:90px;border-radius:10px}
.library-empty{padding:28px;background:#fff;border:1px dashed var(--line);border-radius:20px;color:var(--muted);font-weight:500}
.modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.36);display:none;align-items:center;justify-content:center;padding:20px;z-index:100}
.modal-backdrop.show{display:flex}
.modal-card{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px;max-width:430px;width:100%;box-shadow:0 20px 44px rgba(15,23,42,.18)}
.modal-title{font-size:1.08rem;font-weight:900;margin-bottom:12px}
.option-list{display:flex;flex-direction:column;gap:8px;max-height:320px;overflow:auto}
.option-item{padding:12px 14px;border:1px solid var(--line);border-radius:14px;cursor:pointer}
.option-item:hover{background:#f5f8ff}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:14px}
.host-shell{width:100%;background:var(--brand-dark);color:#fff;min-height:100vh}
.host-top{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 18px;background:rgba(0,0,0,.18)}
.progress{flex:1;height:8px;background:rgba(255,255,255,.16);border-radius:999px;overflow:hidden}
.progress > div{height:100%;background:#fff;width:100%}
.timer{font-size:1.4rem;font-weight:900;min-width:64px;text-align:center}
.host-content{max-width:980px;margin:0 auto;padding:20px}
.lobby-card{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:28px;padding:24px;text-align:center}
.code{font-size:4rem;line-height:1;font-weight:900;letter-spacing:10px}
.lobby-grid{display:grid;grid-template-columns:220px 1fr;gap:18px;align-items:start;margin-top:18px}
.qr-box{background:#fff;border-radius:18px;padding:12px;color:#111827}
.qr-box img{width:180px;height:180px;border-radius:8px;display:block;margin:0 auto}
.player-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.player-chip{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.18);padding:8px 14px;border-radius:999px;font-weight:700}
.host-card{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:24px;padding:18px}
.phase-tag{text-align:center;font-size:.82rem;letter-spacing:1px;font-weight:900;color:rgba(255,255,255,.74);margin-bottom:10px}
.host-media{display:flex;justify-content:center;margin-bottom:12px}
.host-media img,.host-media video{max-width:100%;max-height:280px;border-radius:14px}
.host-question{font-size:1.5rem;font-weight:900;line-height:1.35;text-align:center}
.host-answers{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.host-answer{border:none;border-radius:20px;min-height:88px;padding:16px;color:#fff;font-weight:900;display:flex;align-items:center;justify-content:center;gap:10px;text-align:center}
.host-answer.blue{background:var(--blue)}
.host-answer.green{background:var(--green)}
.host-answer.orange{background:var(--orange)}
.host-answer.yellow{background:var(--yellow);color:#3b2d00}
.host-answer.correct{outline:4px solid #fff;box-shadow:0 0 0 5px rgba(76,255,145,.34)}
.host-answer.dim{opacity:.34}
.host-answer .thumb img,.host-answer .thumb video{max-height:50px;border-radius:8px}
.stat-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:14px}
.stat{background:rgba(255,255,255,.12);border-radius:14px;padding:10px 16px;min-width:100px;text-align:center}
.stat .n{font-size:1.3rem;font-weight:900}
.notice{margin-top:14px;text-align:center;font-weight:700;color:rgba(255,255,255,.85)}
.control-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:16px}
.lb-shell{max-width:860px;margin:22px auto;padding:0 18px 24px}
.lb-card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:20px}
.rank-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;background:#f7f9fc;margin-bottom:8px}
.rank-no{font-weight:900;color:var(--muted);min-width:28px}
.rank-name{flex:1;font-weight:700}
.rank-delta{font-size:.85rem;color:var(--success);font-weight:700}
.rank-score{font-weight:900}
.final-wrap{display:grid;grid-template-columns:320px 1fr;gap:22px;max-width:1100px;margin:22px auto;padding:0 18px 24px}
.podium{display:flex;justify-content:center;align-items:flex-end;gap:10px;min-height:280px}
.pod{display:flex;flex-direction:column;align-items:center;justify-content:flex-end}
.pod-name{font-weight:900;margin-bottom:6px;text-align:center;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pod-block{width:88px;border-radius:18px 18px 0 0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.5rem;font-weight:900}
.gold .pod-block{height:170px;background:#f0b323}
.silver .pod-block{height:128px;background:#adb6c5}
.bronze .pod-block{height:96px;background:#b57945}
.student-shell{background:var(--brand-dark);color:#fff;min-height:100vh}
.student-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(0,0,0,.18);font-weight:700}
.student-main{max-width:680px;margin:0 auto;padding:16px}
.student-card{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:24px;padding:16px}
.student-phase{text-align:center;font-weight:800;color:rgba(255,255,255,.84);margin-bottom:12px}
.student-media{display:flex;justify-content:center;margin-bottom:12px}
.student-media img,.student-media video{max-width:100%;max-height:230px;border-radius:14px}
.student-question{text-align:center;font-size:1.1rem;font-weight:900;line-height:1.35}
.student-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.student-answer{border:none;border-radius:22px;min-height:138px;aspect-ratio:1/1;padding:14px;color:#fff;font-weight:900;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;cursor:pointer}
.student-answer.blue{background:var(--blue)}
.student-answer.green{background:var(--green)}
.student-answer.orange{background:var(--orange)}
.student-answer.yellow{background:var(--yellow);color:#3b2d00}
.student-answer.selected{outline:4px solid #fff}
.student-answer.locked{opacity:.55;cursor:default}
.student-answer .thumb img,.student-answer .thumb video{max-height:54px;border-radius:8px}
.student-result{text-align:center;font-weight:800;margin-top:14px}
.join-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
.join-shell{width:100%;max-width:1040px;display:grid;grid-template-columns:1.02fr .98fr;gap:24px}
.join-hero,.join-card{background:#fff;border:1px solid var(--line);border-radius:28px;box-shadow:0 12px 38px rgba(15,23,42,.07)}
.join-hero{padding:38px;background:linear-gradient(145deg,var(--brand-dark),var(--brand));color:#fff;position:relative;overflow:hidden}
.join-hero::after{content:'';position:absolute;right:-70px;bottom:-70px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.08)}
.join-brand{font-size:2.4rem;font-weight:900;margin-bottom:12px}
.join-brand em{font-style:normal;color:var(--orange)}
.join-card{padding:28px}
@media(max-width:980px){.app-container{grid-template-columns:1fr}.left-pane{border-right:none;border-bottom:1px solid var(--line)}.editor-shell{grid-template-columns:1fr}.editor-left{border-right:none;border-bottom:1px solid var(--line)}.final-wrap{grid-template-columns:1fr}.lobby-grid{grid-template-columns:1fr}.join-shell{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="boot-screen" class="boot-screen"><div class="boot-mark">Tap<em>Blast</em></div></div>
<div id="login-screen" class="screen">
  <div class="center-stage">
    <div class="center-card">
      <div class="login-brand">Tap<em>Blast</em></div>
      <button id="googleLoginBtn" type="button" class="btn primary" style="width:100%;margin-top:16px">Continue with Google</button>
      <div id="loginError" style="margin-top:14px;color:var(--danger);font-weight:700;min-height:22px"></div>
    </div>
  </div>
</div>
<div id="library-screen" class="screen"><div class="app-shell"><div class="app-container">
<aside class="left-pane"><div class="folder-head"><div style="font-weight:900;font-size:1.1rem">Folders</div><button id="newFolderBtn" class="btn icon outline" type="button" title="New Folder"><span class="material-symbols-outlined">create_new_folder</span></button></div><div id="folderList" class="folder-list"></div></aside>
<section class="main-pane"><div class="topbar"><div><div class="brand">Tap<em>Blast</em></div><div class="subtle" id="librarySubtle"></div></div><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><div id="teacherName" style="font-weight:700"></div><button id="newQuizBtn" type="button" class="btn primary"><span class="material-symbols-outlined">add</span>New Quiz</button><button id="logoutBtn" type="button" class="btn outline">Sign Out</button></div></div><div class="content-wrap"><div class="search-row"><input id="searchInput" type="text" placeholder="Search quizzes"></div><div id="quizGrid" class="quiz-grid"></div><div id="emptyState" class="library-empty hidden">No quizzes here.</div></div></section>
</div></div></div>
<div id="editor-screen" class="screen"><div style="width:100%"><div class="topbar"><div><div class="brand">Tap<em>Blast</em></div><div class="subtle">Quiz Editor</div></div><div style="display:flex;gap:10px;flex-wrap:wrap"><button id="editorBackBtn" type="button" class="btn outline">Library</button><button id="previewQuizBtn" type="button" class="btn outline">Preview Host</button><button id="saveQuizBtn" type="button" class="btn primary">Save Quiz</button></div></div><div class="app-shell"><div class="app-container editor-shell" style="max-width:1440px"><aside class="editor-left"><div style="font-weight:900;font-size:1rem;margin-bottom:10px">Questions</div><div id="questionList" class="question-list"></div><button id="addQuestionBtn" class="btn primary" type="button" style="width:100%;margin-top:10px"><span class="material-symbols-outlined">add</span>Add Question</button></aside><main class="content-wrap" style="padding:20px"><div class="panel" style="max-width:900px"><div class="field"><label for="quizTitle">Quiz Title</label><input id="quizTitle" type="text" placeholder="Quiz title"></div><div class="field"><label for="quizFolderSelect">Folder</label><select id="quizFolderSelect"></select></div><div class="field"><label>Quiz Cover</label><div id="coverDrop" class="media-drop"><div>Click or drag image here</div><input id="coverInput" type="file" accept="image/*" class="hidden"></div><div id="coverPreview" class="media-preview"></div><button id="clearCoverBtn" type="button" class="btn ghost hidden" style="margin-top:8px">Remove Cover</button></div><hr style="border:none;border-top:1px solid var(--line);margin:18px 0"><div class="field"><label for="questionText">Question</label><textarea id="questionText" placeholder="Type question"></textarea></div><div class="field"><label>Question Media</label><div id="questionMediaDrop" class="media-drop"><div>Click or drag image, gif, or video here</div><input id="questionMediaInput" type="file" accept="image/*,video/*" class="hidden"></div><div id="questionMediaPreview" class="media-preview"></div><button id="clearQuestionMediaBtn" type="button" class="btn ghost hidden" style="margin-top:8px">Remove Media</button></div><div class="field"><label>Answers</label><div id="answersGrid" class="answers-grid"></div></div><div class="field"><label for="questionSeconds">Seconds</label><input id="questionSeconds" type="number" min="5" max="120" value="20"></div><div style="display:flex;justify-content:flex-end;gap:10px"><button id="deleteQuestionBtn" type="button" class="btn danger">Delete Question</button></div></div></main></div></div></div></div>
<div id="host-screen" class="screen host-shell"><div style="width:100%"><div class="host-top"><div class="progress"><div id="hostProgressFill"></div></div><div id="hostTimer" class="timer">20</div></div><div class="host-content"><div id="hostLobby" class="lobby-card"><div style="font-size:1.35rem;font-weight:900" id="lobbyQuizTitle"></div><div style="margin-top:8px;font-weight:700;opacity:.78">Room Code</div><div id="roomCodeDisplay" class="code">----</div><div style="margin-top:8px;font-weight:700;word-break:break-word" id="joinUrlLabel"></div><div class="lobby-grid"><div class="qr-box"><img id="qrImage" alt="Join QR"></div><div><div id="playerCountText" style="font-size:1rem;font-weight:900;margin-bottom:10px">0 players joined</div><div id="playerChips" class="player-chips"></div><div class="control-row"><button id="startQuizBtn" type="button" class="btn primary">Start Quiz</button><button id="endLobbyBtn" type="button" class="btn danger">End Game</button></div></div></div></div><div id="hostQuestionPanel" class="host-card hidden"><div id="hostPhaseTag" class="phase-tag"></div><div id="hostMedia" class="host-media"></div><div id="hostQuestionText" class="host-question"></div><div id="hostAnswers" class="host-answers"></div><div id="hostStats" class="stat-row"></div><div id="hostNotice" class="notice"></div><div class="control-row"><button id="pauseBtn" type="button" class="btn outline">Pause</button><button id="resumeBtn" type="button" class="btn primary hidden">Resume</button><button id="showResultsBtn" type="button" class="btn primary hidden">Show Results</button><button id="nextQuestionBtn" type="button" class="btn primary hidden">Next Question</button><button id="endGameBtn" type="button" class="btn danger">End Game</button></div></div></div></div></div>
<div id="leaderboard-screen" class="screen"><div style="width:100%"><div class="topbar"><div><div class="brand">Tap<em>Blast</em></div><div class="subtle">Scoreboard</div></div><div style="display:flex;gap:10px"><button id="leaderboardNextBtn" type="button" class="btn primary">Next Question</button><button id="leaderboardEndBtn" type="button" class="btn danger">End Game</button></div></div><div class="lb-shell"><div class="lb-card"><div id="leaderboardTitle" style="font-size:1.28rem;font-weight:900;margin-bottom:12px"></div><div id="leaderboardList"></div></div></div></div></div>
<div id="final-screen" class="screen"><div style="width:100%"><div class="topbar"><div><div class="brand">Tap<em>Blast</em></div><div class="subtle">Final Results</div></div><button id="finalLibraryBtn" type="button" class="btn primary">Back to Library</button></div><div class="final-wrap"><div id="podiumCard" class="lb-card"><div style="font-size:1.2rem;font-weight:900;margin-bottom:10px">Podium</div><div id="podium" class="podium"></div></div><div class="lb-card"><div style="font-size:1.2rem;font-weight:900;margin-bottom:10px">All Players</div><div id="finalList"></div></div></div></div></div>
<div id="student-join-screen" class="screen"><div class="join-wrap"><div class="join-shell"><section class="join-hero"><div class="join-brand">Tap<em>Blast</em></div></section><section class="join-card"><div class="field"><label for="studentCode">Room Code</label><input id="studentCode" type="text" maxlength="6" inputmode="numeric"></div><div class="field"><label for="studentName">Nickname</label><input id="studentName" type="text" maxlength="20"></div><button id="studentJoinBtn" type="button" class="btn primary" style="width:100%">Join</button><div id="studentJoinError" style="margin-top:12px;color:var(--danger);font-weight:700;min-height:22px"></div></section></div></div></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCjh16vsvzWmt9dUkH6O4brRf8hfTOhzYA",
  authDomain: "tapblast-8e13a.firebaseapp.com",
  projectId: "tapblast-8e13a",
  storageBucket: "tapblast-8e13a.firebasestorage.app",
  messagingSenderId: "1069456061706",
  appId: "1:1069456061706:web:0fc650dfac4de09de536f3",
  measurementId: "G-QLTZFNLH2X"
};
if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(console.error);
const ROOT='tapblast_clean_v1';
const $ = id => document.getElementById(id);
const answerColors=['blue','green','orange','yellow'];
const showScreen = id => document.querySelectorAll('.screen').forEach(el => el.classList.toggle('active', el.id===id));
const esc = s => String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const clone = obj => JSON.parse(JSON.stringify(obj));
const genId = () => 'id_' + Math.random().toString(36).slice(2,10);
let currentTeacher=null, folders=[], quizzes=[], selectedFolderId='all', searchTerm='', editorQuiz=null, selectedQuestionId=null, hostRoom=null, hostRoomUnsub=null, hostTimerHandle=null, revealHandle=null, pendingFolderAction=null, pendingFolderId=null, studentPlayerId=null, studentRoomUnsub=null, previewMode=false;
const qRef=uid=>db.ref(`${ROOT}/quizzes/${uid}`);
const fRef=uid=>db.ref(`${ROOT}/folders/${uid}`);
const roomRef=code=>db.ref(`${ROOT}/rooms/${code}`);
const hostSessionRef=uid=>db.ref(`${ROOT}/hostSessions/${uid}`);
const defaultFolder=name=>({id:genId(),name,updatedAt:Date.now()});
function defaultQuestion(){return {id:genId(),text:'',seconds:20,media:null,answers:[0,1,2,3].map(()=>({id:genId(),text:'',media:null})),correctIndex:0};}
function defaultQuiz(){return {id:genId(),title:'Untitled Quiz',folderId:'',cover:null,updatedAt:Date.now(),questions:[defaultQuestion()]};}
function getJoinUrl(code){return 'https://latnem.github.io/TapBlast/join/?code='+encodeURIComponent(code||'');}
function qrUrl(url){return 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&data='+encodeURIComponent(url);}
function nonBlankAnswers(q){return (q.answers||[]).map((a,i)=>({...a,index:i})).filter(a=>(a.text||'').trim()||a.media);}
function folderNameById(id){if(!id) return 'Unsorted'; const f=folders.find(x=>x.id===id); return f?f.name:'Unsorted';}
function sortedPlayers(room){return Object.entries(room.players||{}).map(([id,p])=>({id,...p})).sort((a,b)=>(b.score||0)-(a.score||0)||(a.joinedAt||0)-(b.joinedAt||0));}
function setBootComplete(){$('boot-screen').style.display='none';}
function readDataUrl(file, cb){if(!file) return; const fr=new FileReader(); fr.onload=()=>cb(fr.result); fr.readAsDataURL(file);}
async function signInTeacher(){ $('loginError').textContent=''; try{ const provider=new firebase.auth.GoogleAuthProvider(); provider.setCustomParameters({prompt:'select_account'}); await auth.signInWithPopup(provider);}catch(err){console.error(err); $('loginError').textContent=err.message||'Login failed';}}
async function logoutTeacher(){try{await auth.signOut();}catch(err){console.error(err);}}
auth.onAuthStateChanged(async user=>{ currentTeacher=user||null; if(currentTeacher){ $('teacherName').textContent=currentTeacher.displayName||currentTeacher.email||'Teacher'; await ensureDefaultFolders(); await loadFolders(); await loadQuizzes(); const resumed=await tryResumeHost(); if(!resumed) showScreen('library-screen'); } else { showScreen('login-screen'); } setBootComplete(); });
async function ensureDefaultFolders(){ if(!currentTeacher) return; const snap=await fRef(currentTeacher.uid).get(); if(snap.exists()) return; const starter=[defaultFolder('Math'),defaultFolder('Science')]; const updates={}; starter.forEach(f=>updates[f.id]=f); await fRef(currentTeacher.uid).update(updates); }
async function loadFolders(){ const snap=await fRef(currentTeacher.uid).get(); folders=snap.exists()?Object.values(snap.val()||{}).sort((a,b)=>a.name.localeCompare(b.name)):[]; renderFolders(); }
async function loadQuizzes(){ const snap=await qRef(currentTeacher.uid).get(); quizzes=snap.exists()?Object.values(snap.val()||{}).sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0)):[]; renderLibrary(); }
function renderFolders(){ const items=[{id:'all',name:'All Quizzes'},{id:'unsorted',name:'Unsorted'},...folders]; $('folderList').innerHTML=items.map(item=>`<div class="folder-item ${selectedFolderId===item.id?'active':''}" data-folder-id="${item.id}"><span class="material-symbols-outlined">folder</span><div class="folder-name">${esc(item.name)}</div>${item.id!=='all'&&item.id!=='unsorted'?`<button class="btn icon ghost" type="button" data-folder-menu="${item.id}"><span class="material-symbols-outlined">more_vert</span></button>`:''}</div>`).join(''); document.querySelectorAll('[data-folder-id]').forEach(el=>{ const id=el.dataset.folderId; el.addEventListener('click',e=>{ if(e.target.closest('[data-folder-menu]')) return; selectedFolderId=id; renderFolders(); renderLibrary();}); el.addEventListener('dragover',e=>{e.preventDefault(); el.classList.add('drop-target');}); el.addEventListener('dragleave',()=>el.classList.remove('drop-target')); el.addEventListener('drop',async e=>{ e.preventDefault(); el.classList.remove('drop-target'); const quizId=e.dataTransfer.getData('text/plain'); if(!quizId||id==='all') return; await moveQuizToFolder(quizId, id==='unsorted'?'':id); }); }); document.querySelectorAll('[data-folder-menu]').forEach(btn=>btn.onclick=e=>{ e.stopPropagation(); const folderId=btn.dataset.folderMenu; const folder=folders.find(f=>f.id===folderId); if(!folder) return; const action=prompt('Type: rename or delete','rename'); if(action==='rename') openFolderModal('rename',folderId,folder.name); else if(action==='delete') deleteFolder(folderId); }); }
function filterQuizzes(){ let arr=[...quizzes]; if(selectedFolderId==='unsorted') arr=arr.filter(q=>!q.folderId); else if(selectedFolderId!=='all') arr=arr.filter(q=>q.folderId===selectedFolderId); if(searchTerm.trim()) arr=arr.filter(q=>(q.title||'').toLowerCase().includes(searchTerm.trim().toLowerCase())); return arr; }
function renderLibrary(){ $('librarySubtle').textContent = selectedFolderId==='all'?'All Quizzes':folderNameById(selectedFolderId==='unsorted'?'':selectedFolderId); const filtered=filterQuizzes(); $('emptyState').classList.toggle('hidden', filtered.length!==0); $('quizGrid').innerHTML=filtered.map(q=>`<div class="quiz-card" draggable="true" data-quiz-id="${q.id}"><div class="quiz-cover">${q.cover?`<img src="${q.cover}" alt="">`:`<span class="material-symbols-outlined">image</span>`}</div><div class="quiz-body"><div class="quiz-head"><h3 class="quiz-title">${esc(q.title)}</h3><div class="menu-wrap"><button class="menu-btn" type="button" data-menu-btn="${q.id}"><span class="material-symbols-outlined">more_vert</span></button><div class="menu-pop hidden" id="menu-${q.id}"><button type="button" data-duplicate="${q.id}"><span class="material-symbols-outlined">content_copy</span>Duplicate Quiz</button><button type="button" data-move="${q.id}"><span class="material-symbols-outlined">drive_file_move</span>Move to Folder</button><button type="button" data-rename="${q.id}"><span class="material-symbols-outlined">edit</span>Rename Quiz</button><button type="button" data-delete="${q.id}"><span class="material-symbols-outlined">delete</span>Delete Quiz</button></div></div></div><div class="quiz-meta">${(q.questions||[]).length} question${(q.questions||[]).length===1?'':'s'} · ${esc(folderNameById(q.folderId))}</div><div class="quiz-actions"><button class="btn outline" type="button" data-edit="${q.id}">Edit</button><button class="btn primary" type="button" data-host="${q.id}">Host</button></div></div></div>`).join(''); bindLibraryEvents(); }
function closeAllMenus(){ document.querySelectorAll('.menu-pop').forEach(el=>el.classList.add('hidden')); }
function bindLibraryEvents(){ document.querySelectorAll('[data-edit]').forEach(btn=>btn.onclick=()=>openEditor(btn.dataset.edit)); document.querySelectorAll('[data-host]').forEach(btn=>btn.onclick=()=>startHosting(btn.dataset.host)); document.querySelectorAll('[data-menu-btn]').forEach(btn=>btn.onclick=e=>{ e.stopPropagation(); const pop=$('menu-'+btn.dataset.menuBtn); const isOpen=!pop.classList.contains('hidden'); closeAllMenus(); pop.classList.toggle('hidden', isOpen); }); document.querySelectorAll('[data-duplicate]').forEach(btn=>btn.onclick=()=>duplicateQuiz(btn.dataset.duplicate)); document.querySelectorAll('[data-move]').forEach(btn=>btn.onclick=()=>openMoveQuizModal(btn.dataset.move)); document.querySelectorAll('[data-rename]').forEach(btn=>btn.onclick=()=>renameQuiz(btn.dataset.rename)); document.querySelectorAll('[data-delete]').forEach(btn=>btn.onclick=()=>deleteQuiz(btn.dataset.delete)); document.querySelectorAll('.quiz-card[draggable="true"]').forEach(card=>{ card.addEventListener('dragstart',e=>{ card.classList.add('dragging'); e.dataTransfer.setData('text/plain', card.dataset.quizId); }); card.addEventListener('dragend',()=>card.classList.remove('dragging')); }); }
document.addEventListener('click', e=>{ if(!e.target.closest('.menu-wrap')) closeAllMenus(); });
async function saveFolder(folder){ await fRef(currentTeacher.uid).child(folder.id).set(folder); await loadFolders(); }
function openFolderModal(mode, folderId='', name=''){ pendingFolderAction=mode; pendingFolderId=folderId; $('folderModalTitle').textContent=mode==='new'?'New Folder':'Rename Folder'; $('folderNameInput').value=name||''; $('folderModal').classList.add('show'); }
function closeFolderModal(){ $('folderModal').classList.remove('show'); }
async function commitFolderModal(){ const name=$('folderNameInput').value.trim(); if(!name) return; if(pendingFolderAction==='new') await saveFolder({id:genId(),name,updatedAt:Date.now()}); else if(pendingFolderAction==='rename'&&pendingFolderId){ const folder=folders.find(f=>f.id===pendingFolderId); if(folder){folder.name=name; folder.updatedAt=Date.now(); await saveFolder(folder);} } closeFolderModal(); }
async function deleteFolder(folderId){ const impacted=quizzes.filter(q=>q.folderId===folderId); for(const q of impacted){ await qRef(currentTeacher.uid).child(q.id).update({folderId:'',updatedAt:Date.now()}); } await fRef(currentTeacher.uid).child(folderId).remove(); if(selectedFolderId===folderId) selectedFolderId='all'; await loadFolders(); await loadQuizzes(); }
async function moveQuizToFolder(quizId, folderId){ await qRef(currentTeacher.uid).child(quizId).update({folderId:folderId||'',updatedAt:Date.now()}); closeMoveQuizModal(); await loadQuizzes(); }
function openMoveQuizModal(quizId){ const options=[{id:'',name:'Unsorted'},...folders.map(f=>({id:f.id,name:f.name}))]; $('moveQuizOptions').innerHTML=options.map(opt=>`<div class="option-item" data-folder-pick="${opt.id}">${esc(opt.name)}</div>`).join(''); $('moveQuizOptions').querySelectorAll('[data-folder-pick]').forEach(el=>el.onclick=()=>moveQuizToFolder(quizId, el.dataset.folderPick)); $('moveQuizModal').classList.add('show'); }
function closeMoveQuizModal(){ $('moveQuizModal').classList.remove('show'); }
async function renameQuiz(quizId){ const q=quizzes.find(x=>x.id===quizId); if(!q) return; const next=prompt('Rename quiz', q.title||''); if(next===null) return; await qRef(currentTeacher.uid).child(quizId).update({title:next.trim()||'Untitled Quiz',updatedAt:Date.now()}); await loadQuizzes(); }
async function deleteQuiz(quizId){ await qRef(currentTeacher.uid).child(quizId).remove(); await loadQuizzes(); }
async function duplicateQuiz(quizId){ const q=quizzes.find(x=>x.id===quizId); if(!q) return; const copy=clone(q); copy.id=genId(); copy.title=(q.title||'Quiz')+' Copy'; copy.updatedAt=Date.now(); (copy.questions||[]).forEach(question=>{question.id=genId(); (question.answers||[]).forEach(ans=>ans.id=genId());}); await qRef(currentTeacher.uid).child(copy.id).set(copy); await loadQuizzes(); }
function openEditor(quizId){ const found=quizzes.find(q=>q.id===quizId); editorQuiz=clone(found||defaultQuiz()); selectedQuestionId=editorQuiz.questions[0]?.id||null; renderEditor(); showScreen('editor-screen'); }
function createNewQuiz(){ editorQuiz=defaultQuiz(); selectedQuestionId=editorQuiz.questions[0].id; renderEditor(); showScreen('editor-screen'); }
function currentQuestion(){ return editorQuiz.questions.find(q=>q.id===selectedQuestionId)||editorQuiz.questions[0]; }
function renderEditor(){ $('quizTitle').value=editorQuiz.title||''; renderFolderSelect(); renderQuestionList(); renderCoverPreview(); renderQuestionForm(); }
function renderFolderSelect(){ $('quizFolderSelect').innerHTML=`<option value="">Unsorted</option>`+folders.map(f=>`<option value="${f.id}" ${editorQuiz.folderId===f.id?'selected':''}>${esc(f.name)}</option>`).join(''); }
function renderQuestionList(){ $('questionList').innerHTML=editorQuiz.questions.map((q,i)=>`<div class="question-card ${q.id===selectedQuestionId?'active':''}" draggable="true" data-qid="${q.id}"><div style="font-weight:900;margin-bottom:4px">Q${i+1}</div><div style="font-size:.92rem">${esc(q.text||'Untitled question')}</div></div>`).join(''); document.querySelectorAll('.question-card').forEach(card=>{ card.onclick=()=>{ saveQuestionForm(); selectedQuestionId=card.dataset.qid; renderEditor(); }; card.addEventListener('dragstart',e=>e.dataTransfer.setData('text/plain', card.dataset.qid)); card.addEventListener('dragover',e=>e.preventDefault()); card.addEventListener('drop',e=>{ e.preventDefault(); reorderQuestions(e.dataTransfer.getData('text/plain'), card.dataset.qid); }); }); }
function reorderQuestions(draggedId,targetId){ if(draggedId===targetId) return; const list=editorQuiz.questions; const from=list.findIndex(q=>q.id===draggedId); const to=list.findIndex(q=>q.id===targetId); if(from<0||to<0) return; const [item]=list.splice(from,1); list.splice(to,0,item); renderQuestionList(); }
function renderCoverPreview(){ $('clearCoverBtn').classList.toggle('hidden', !editorQuiz.cover); $('coverPreview').innerHTML=editorQuiz.cover?`<img src="${editorQuiz.cover}" style="max-width:100%;max-height:180px;border-radius:14px">`:''; }
function renderQuestionForm(){ const q=currentQuestion(); $('questionText').value=q.text||''; $('questionSeconds').value=q.seconds||20; renderQuestionMediaPreview(q.media); renderAnswersEditor(q); }
function renderQuestionMediaPreview(media){ $('clearQuestionMediaBtn').classList.toggle('hidden', !media); $('questionMediaPreview').innerHTML=!media?'':(media.type==='video'?`<video src="${media.dataUrl}" controls></video>`:`<img src="${media.dataUrl}">`); }
function renderAnswersEditor(q){ $('answersGrid').innerHTML=(q.answers||[]).map((ans,i)=>`<div class="answer-edit"><div class="top"><input type="radio" name="correctAnswer" value="${i}" ${q.correctIndex===i?'checked':''}><input type="text" data-answer-text="${i}" placeholder="Answer ${i+1}" value="${esc(ans.text)}"></div><div class="answer-media-preview">${ans.media?(ans.media.type==='video'?`<video src="${ans.media.dataUrl}" controls></video>`:`<img src="${ans.media.dataUrl}">`):''}</div><div style="display:flex;gap:8px;margin-top:10px"><button type="button" class="btn outline" data-answer-media-btn="${i}">Add Media</button><button type="button" class="btn ghost ${ans.media?'':'hidden'}" data-answer-media-clear="${i}">Remove Media</button><input type="file" class="hidden" accept="image/*,video/*" id="answerMediaInput-${i}"></div></div>`).join(''); $('answersGrid').querySelectorAll('[data-answer-media-btn]').forEach(btn=>btn.onclick=()=>$('answerMediaInput-'+btn.dataset.answerMediaBtn).click()); $('answersGrid').querySelectorAll('input[type="file"]').forEach(input=>input.onchange=e=>{ const idx=parseInt(input.id.split('-').pop(),10); const file=(e.target.files||[])[0]; if(!file) return; readDataUrl(file,dataUrl=>{ currentQuestion().answers[idx].media={type:file.type.startsWith('video/')?'video':'image',dataUrl}; renderAnswersEditor(currentQuestion()); });}); $('answersGrid').querySelectorAll('[data-answer-media-clear]').forEach(btn=>btn.onclick=()=>{ const idx=parseInt(btn.dataset.answerMediaClear,10); currentQuestion().answers[idx].media=null; renderAnswersEditor(currentQuestion()); }); }
function saveQuestionForm(){ if(!editorQuiz) return; editorQuiz.title=$('quizTitle').value.trim()||'Untitled Quiz'; editorQuiz.folderId=$('quizFolderSelect').value||''; const q=currentQuestion(); q.text=$('questionText').value.trim(); q.seconds=Math.max(5, parseInt($('questionSeconds').value||'20',10)||20); q.correctIndex=parseInt((document.querySelector('input[name="correctAnswer"]:checked')||{}).value||'0',10); q.answers.forEach((ans,i)=>{ const input=document.querySelector(`[data-answer-text="${i}"]`); ans.text=input?input.value.trim():ans.text; }); }
async function saveQuiz(){ saveQuestionForm(); editorQuiz.updatedAt=Date.now(); await qRef(currentTeacher.uid).child(editorQuiz.id).set(editorQuiz); await loadQuizzes(); showScreen('library-screen'); }
function deleteCurrentQuestion(){ if(editorQuiz.questions.length===1) return; const idx=editorQuiz.questions.findIndex(q=>q.id===selectedQuestionId); editorQuiz.questions.splice(idx,1); selectedQuestionId=editorQuiz.questions[Math.max(0,idx-1)].id; renderEditor(); }
function addQuestion(){ saveQuestionForm(); const q=defaultQuestion(); editorQuiz.questions.push(q); selectedQuestionId=q.id; renderEditor(); }
function clearCover(){ editorQuiz.cover=null; renderCoverPreview(); }
function clearQuestionMedia(){ currentQuestion().media=null; renderQuestionMediaPreview(null); }
function bindDropZone(dropId,inputId,onData){ const drop=$(dropId), input=$(inputId); drop.onclick=()=>input.click(); ['dragenter','dragover'].forEach(evt=>drop.addEventListener(evt,e=>{e.preventDefault(); drop.classList.add('drag');})); ['dragleave','drop'].forEach(evt=>drop.addEventListener(evt,e=>{e.preventDefault(); drop.classList.remove('drag');})); drop.addEventListener('drop',e=>{ const file=(e.dataTransfer.files||[])[0]; if(file) onData(file);}); input.onchange=e=>{ const file=(e.target.files||[])[0]; if(file) onData(file);}; }
async function tryResumeHost(){ const snap=await hostSessionRef(currentTeacher.uid).get(); if(!snap.exists()) return false; const code=snap.val().roomCode; if(!code) return false; const rs=await roomRef(code).get(); if(!rs.exists()) return false; const room=rs.val(); if(!room||room.phase==='ended') return false; startHostListener(code); return true; }
async function startHosting(quizId){ const quiz=clone(quizzes.find(q=>q.id===quizId)); if(!quiz) return; cleanupHost(); const code=String(Math.floor(100000+Math.random()*900000)); const room={code,hostUid:currentTeacher.uid,hostName:currentTeacher.displayName||currentTeacher.email||'Teacher',quiz,currentQ:0,phase:'lobby',currentQuestionEndsAt:0,currentRemainingMs:0,paused:false,players:{},updatedAt:Date.now()}; await roomRef(code).set(room); await hostSessionRef(currentTeacher.uid).set({roomCode:code,updatedAt:Date.now()}); startHostListener(code); }
function cleanupHost(){ if(hostRoomUnsub){hostRoomUnsub(); hostRoomUnsub=null;} if(hostTimerHandle){clearInterval(hostTimerHandle); hostTimerHandle=null;} if(revealHandle){clearTimeout(revealHandle); revealHandle=null;} }
function startHostListener(code){ cleanupHost(); const ref=roomRef(code); const cb=snap=>{ if(!snap.exists()){ endHostToLibrary(false); return; } hostRoom=snap.val(); renderHost(); }; ref.on('value',cb); hostRoomUnsub=()=>ref.off('value',cb); showScreen('host-screen'); }
function renderHost(){ if(hostRoom.phase==='lobby') return renderHostLobby(); if(hostRoom.phase==='leaderboard') return renderLeaderboard(); if(hostRoom.phase==='final') return renderFinal(); if(hostRoom.phase==='ended') return endHostToLibrary(false); renderHostQuestion(); }
function renderHostLobby(){ $('hostLobby').classList.remove('hidden'); $('hostQuestionPanel').classList.add('hidden'); $('lobbyQuizTitle').textContent=hostRoom.quiz.title||'Quiz'; $('roomCodeDisplay').textContent=hostRoom.code||'----'; const join = previewMode ? 'Preview mode' : getJoinUrl(hostRoom.code); $('joinUrlLabel').textContent=join; $('qrImage').src = previewMode ? '' : qrUrl(join); const players=sortedPlayers(hostRoom); $('playerCountText').textContent=`${players.length} player${players.length===1?'':'s'} joined`; $('playerChips').innerHTML=players.map(p=>`<div class="player-chip">${esc(p.name)}</div>`).join(''); }
function renderAnswerContent(answer){ const media=answer.media?`<span class="thumb">${answer.media.type==='video'?`<video src="${answer.media.dataUrl}" muted></video>`:`<img src="${answer.media.dataUrl}">`}</span>`:''; const text=answer.text?`<span>${esc(answer.text)}</span>`:''; return media+text; }
function renderHostQuestion(){ $('hostLobby').classList.add('hidden'); $('hostQuestionPanel').classList.remove('hidden'); const q=hostRoom.quiz.questions[hostRoom.currentQ]; const phaseMap={countdown:'Get Ready',question_media:'Watch Question',question_answers:'Choose Answer',paused:'Paused',locked:'Time is up',answer_results:'Correct Answer'}; $('hostPhaseTag').textContent=phaseMap[hostRoom.phase]||''; $('hostQuestionText').textContent=hostRoom.phase==='countdown'?'3':(q.text||''); $('hostMedia').innerHTML=''; if(q.media){ if(q.media.type==='video'){ $('hostMedia').innerHTML=`<video id="hostVideo" src="${q.media.dataUrl}" ${hostRoom.phase==='question_media'?'autoplay':''} controls style="max-width:100%;max-height:280px;border-radius:14px"></video>`; if(hostRoom.phase==='question_media'){ const vid=$('hostVideo'); vid.onended=async()=>{ if(previewMode){ if(hostRoom && hostRoom.phase==='question_media') previewBeginAnswerPhase(); } else { const snap=await roomRef(hostRoom.code).get(); const current=snap.val(); if(current&&current.phase==='question_media') await beginAnswerPhase(current); } }; } } else $('hostMedia').innerHTML=`<img src="${q.media.dataUrl}" alt="">`; } const showAnswers=!['countdown','question_media'].includes(hostRoom.phase); const answers=nonBlankAnswers(q); $('hostAnswers').innerHTML=answers.map((a,idx)=>`<div class="host-answer ${answerColors[idx%4]} ${hostRoom.phase==='answer_results'&&a.index===q.correctIndex?'correct':''} ${hostRoom.phase==='answer_results'&&a.index!==q.correctIndex?'dim':''} ${showAnswers?'':'hidden'}">${renderAnswerContent(a)}</div>`).join(''); const players=sortedPlayers(hostRoom); const answered=players.filter(p=>p.answerQ===hostRoom.currentQ&&typeof p.currentAnswerIndex==='number').length; $('hostStats').innerHTML=`<div class="stat"><div class="n">${answered}</div><div>Answered</div></div><div class="stat"><div class="n">${Math.max(0,players.length-answered)}</div><div>Waiting</div></div><div class="stat"><div class="n">${players.length}</div><div>Players</div></div>`; $('hostNotice').textContent=hostRoom.phase==='question_media'?'Video plays first. Answers will appear when it ends.':hostRoom.phase==='locked'?'Click Show Results.':hostRoom.phase==='paused'?'Question paused.':hostRoom.phase==='answer_results'?'Scoreboard is next.':''; $('pauseBtn').classList.toggle('hidden', !['question_answers','question_media'].includes(hostRoom.phase)); $('resumeBtn').classList.toggle('hidden', hostRoom.phase!=='paused'); $('showResultsBtn').classList.toggle('hidden', hostRoom.phase!=='locked'); $('nextQuestionBtn').classList.add('hidden'); if(hostTimerHandle){clearInterval(hostTimerHandle); hostTimerHandle=null;} if(hostRoom.phase==='countdown'){ let count=3; $('hostQuestionText').textContent=String(count); hostTimerHandle=setInterval(async()=>{ count-=1; if(count>0) $('hostQuestionText').textContent=String(count); else { clearInterval(hostTimerHandle); hostTimerHandle=null; if(previewMode){ const q = hostRoom.quiz.questions[hostRoom.currentQ]; if(q.media&&q.media.type==='video'){ hostRoom.phase='question_media'; hostRoom.updatedAt=Date.now(); renderHost(); } else { previewBeginAnswerPhase(); } } else { const snap=await roomRef(hostRoom.code).get(); const current=snap.val(); if(!current||current.phase!=='countdown') return; const q=current.quiz.questions[current.currentQ]; if(q.media&&q.media.type==='video') await roomRef(current.code).update({phase:'question_media',updatedAt:Date.now()}); else await beginAnswerPhase(current); } } },1000); return; } if(hostRoom.phase==='question_answers'){ hostTimerHandle=setInterval(async()=>{ if(previewMode){ const q=hostRoom.quiz.questions[hostRoom.currentQ]; const remain=Math.max(0,(hostRoom.currentQuestionEndsAt||0)-Date.now()); $('hostTimer').textContent=String(Math.ceil(remain/1000)); $('hostProgressFill').style.width=`${Math.max(0,Math.min(100,(remain/((q.seconds||20)*1000))*100))}%`; if(remain<=0){ clearInterval(hostTimerHandle); hostTimerHandle=null; previewLockQuestion(); } } else { const snap=await roomRef(hostRoom.code).get(); const current=snap.val(); if(!current||current.phase!=='question_answers'){ clearInterval(hostTimerHandle); hostTimerHandle=null; return; } const q=current.quiz.questions[current.currentQ]; const remain=Math.max(0,(current.currentQuestionEndsAt||0)-Date.now()); $('hostTimer').textContent=String(Math.ceil(remain/1000)); $('hostProgressFill').style.width=`${Math.max(0,Math.min(100,(remain/((q.seconds||20)*1000))*100))}%`; if(remain<=0){ clearInterval(hostTimerHandle); hostTimerHandle=null; await lockQuestion(current); } } },250); } else if(hostRoom.phase==='paused'){ $('hostTimer').textContent=String(Math.ceil((hostRoom.currentRemainingMs||0)/1000)); } else { $('hostTimer').textContent=hostRoom.phase==='question_media'?'--':String(q.seconds||20); } }
async function startQuiz(){ await roomRef(hostRoom.code).update({phase:'countdown',updatedAt:Date.now()}); }
async function beginAnswerPhase(room){ const q=room.quiz.questions[room.currentQ]; await roomRef(room.code).update({phase:'question_answers',paused:false,currentRemainingMs:0,currentQuestionEndsAt:Date.now()+(q.seconds||20)*1000,updatedAt:Date.now()}); }
async function lockQuestion(room){ await roomRef(room.code).update({phase:'locked',paused:false,currentRemainingMs:0,currentQuestionEndsAt:room.currentQuestionEndsAt||0,updatedAt:Date.now()}); }
async function pauseQuestion(){ const snap=await roomRef(hostRoom.code).get(); const room=snap.val(); if(!room||room.phase!=='question_answers') return; await roomRef(room.code).update({phase:'paused',paused:true,currentRemainingMs:Math.max(0,(room.currentQuestionEndsAt||0)-Date.now()),updatedAt:Date.now()}); }
async function resumeQuestion(){ const snap=await roomRef(hostRoom.code).get(); const room=snap.val(); if(!room||room.phase!=='paused') return; await roomRef(room.code).update({phase:'question_answers',paused:false,currentQuestionEndsAt:Date.now()+(room.currentRemainingMs||0),updatedAt:Date.now()}); }
function scoreFor(room, player, q){ const answered=player.answerQ===room.currentQ&&typeof player.currentAnswerIndex==='number'; const correct=answered&&player.currentAnswerIndex===q.correctIndex; if(!correct) return 0; const seconds=q.seconds||20; const responseMs=Math.max(0,seconds*1000-Math.max(0,(room.currentQuestionEndsAt||0)-(player.answerAt||0))); const responseTime=responseMs/1000; if(responseTime<0.5) return 1000; return Math.max(0,Math.round(1000*(1-((responseTime/seconds)/2)))); }
function streakMessage(streak){ if(streak>=5){ const arr=['🔥 On fire!','🔥 Unstoppable!','🔥 Five in a row!']; return arr[Math.floor(Math.random()*arr.length)]; } if(streak===4) return ['Hot streak!','Keep it up!'][Math.floor(Math.random()*2)]; if(streak===3) return ['Answer streak!','Rolling!'][Math.floor(Math.random()*2)]; if(streak===2) return ['Nice!','Good streak!'][Math.floor(Math.random()*2)]; return ''; }
async function showResults(){ const snap=await roomRef(hostRoom.code).get(); const room=snap.val(); if(!room||room.phase!=='locked') return; const q=room.quiz.questions[room.currentQ]; const updates={phase:'answer_results',updatedAt:Date.now()}; Object.entries(room.players||{}).forEach(([pid,p])=>{ const answered=p.answerQ===room.currentQ&&typeof p.currentAnswerIndex==='number'; const correct=answered&&p.currentAnswerIndex===q.correctIndex; const streak=correct?(p.streak||0)+1:0; const delta=scoreFor(room,p,q); updates[`players/${pid}/lastCorrect`]=correct; updates[`players/${pid}/lastDelta`]=delta; updates[`players/${pid}/score`]=(p.score||0)+delta; updates[`players/${pid}/streak`]=streak; updates[`players/${pid}/streakMsg`]=streakMessage(streak); }); await roomRef(room.code).update(updates); if(revealHandle) clearTimeout(revealHandle); revealHandle=setTimeout(async()=>{ const fresh=(await roomRef(room.code).get()).val(); if(fresh&&fresh.phase==='answer_results') await roomRef(room.code).update({phase:'leaderboard',updatedAt:Date.now()}); },1600); }
function renderLeaderboard(){ showScreen('leaderboard-screen'); $('leaderboardTitle').textContent=`After Question ${hostRoom.currentQ+1}`; const players=sortedPlayers(hostRoom); $('leaderboardList').innerHTML=players.map((p,i)=>`<div class="rank-row"><div class="rank-no">${i+1}</div><div class="rank-name">${esc(p.name)}</div><div class="rank-delta">${p.lastDelta?'+'+p.lastDelta:''}</div><div class="rank-score">${p.score||0}</div></div>`).join(''); }
async function nextQuestion(){ const snap=await roomRef(hostRoom.code).get(); const room=snap.val(); if(!room) return; const next=(room.currentQ||0)+1; if(next>=(room.quiz.questions||[]).length){ await roomRef(room.code).update({phase:'final',updatedAt:Date.now()}); return; } const updates={currentQ:next,phase:'countdown',paused:false,currentRemainingMs:0,currentQuestionEndsAt:0,updatedAt:Date.now()}; Object.keys(room.players||{}).forEach(pid=>{ updates[`players/${pid}/currentAnswerIndex`]=null; updates[`players/${pid}/answerAt`]=0; updates[`players/${pid}/answerQ`]=-1; updates[`players/${pid}/lastDelta`]=0; updates[`players/${pid}/lastCorrect`]=false; updates[`players/${pid}/streakMsg`]=''; }); await roomRef(room.code).update(updates); showScreen('host-screen'); }
function renderFinal(){ showScreen('final-screen'); const players=sortedPlayers(hostRoom); if(players.length>=3){ $('podiumCard').classList.remove('hidden'); $('podium').innerHTML=`<div class="pod silver"><div class="pod-name">${esc(players[1].name)}</div><div class="pod-block">2</div></div><div class="pod gold"><div class="pod-name">${esc(players[0].name)}</div><div class="pod-block">1</div></div><div class="pod bronze"><div class="pod-name">${esc(players[2].name)}</div><div class="pod-block">3</div></div>`; } else { $('podiumCard').classList.add('hidden'); $('podium').innerHTML=''; } $('finalList').innerHTML=players.map((p,i)=>`<div class="rank-row"><div class="rank-no">${i+1}</div><div class="rank-name">${esc(p.name)}</div><div class="rank-score">${p.score||0}</div></div>`).join(''); }
async function endGame(){ if(!hostRoom) return; await roomRef(hostRoom.code).update({phase:'ended',updatedAt:Date.now()}); await endHostToLibrary(true); }
async function endHostToLibrary(removeSession){ cleanupHost(); if(removeSession&&currentTeacher) await hostSessionRef(currentTeacher.uid).remove().catch(console.error); hostRoom=null; await loadQuizzes(); showScreen('library-screen'); }
function maybeBootStudentMode(){ if(location.hash!=='#student-join') return false; showScreen('student-join-screen'); const params=new URLSearchParams(location.search); $('studentCode').value=(params.get('code')||'').replace(/\D/g,'').slice(0,6); $('studentName').value=(params.get('name')||'').slice(0,20); return true; }
async function studentJoin(){ const code=($('studentCode').value||'').replace(/\D/g,'').slice(0,6); const name=($('studentName').value||'').trim().slice(0,20); $('studentJoinError').textContent=''; if(!code){ $('studentJoinError').textContent='Enter room code'; return; } if(!name){ $('studentJoinError').textContent='Enter nickname'; return; } const snap=await roomRef(code).get(); if(!snap.exists()){ $('studentJoinError').textContent='Room not found'; return; } const room=snap.val(); if(room.phase==='ended'){ $('studentJoinError').textContent='Game ended'; return; } studentPlayerId=sessionStorage.getItem('tapblast_player_'+code)||db.ref().push().key; sessionStorage.setItem('tapblast_player_'+code, studentPlayerId); const existing=(room.players||{})[studentPlayerId]; const payload=existing||{name,score:0,joinedAt:Date.now(),currentAnswerIndex:null,answerAt:0,answerQ:-1,lastDelta:0,streak:0,streakMsg:''}; payload.name=name; await roomRef(code).child('players').child(studentPlayerId).update(payload); startStudentListener(code); }
function cleanupStudent(){ if(studentRoomUnsub){studentRoomUnsub(); studentRoomUnsub=null;} }
function startStudentListener(code){ cleanupStudent(); const ref=roomRef(code); const cb=snap=>{ if(!snap.exists()) return renderStudentEnded('Game ended'); const room=snap.val(); const player=(room.players||{})[studentPlayerId]; if(!player) return renderStudentEnded('Game ended'); renderStudent(room,player); }; ref.on('value',cb); studentRoomUnsub=()=>ref.off('value',cb); showScreen('student-screen'); }
function renderStudentEnded(msg){ showScreen('student-screen'); $('studentPhase').textContent=msg; $('studentMedia').innerHTML=''; $('studentQuestion').textContent=''; $('studentAnswerGrid').innerHTML=''; $('studentResult').textContent=''; }
function renderStudent(room,player){ $('studentTopName').textContent=player.name||'Player'; $('studentTopScore').textContent=String(player.score||0); if(room.phase==='ended') return renderStudentEnded('Game ended'); if(room.phase==='leaderboard'){ $('studentPhase').textContent='Scoreboard updated'; $('studentMedia').innerHTML=''; $('studentQuestion').textContent='Waiting for next question'; $('studentAnswerGrid').innerHTML=''; $('studentResult').textContent=player.lastDelta?'+'+player.lastDelta:''; return; } if(room.phase==='final'){ $('studentPhase').textContent='Final results'; $('studentMedia').innerHTML=''; $('studentQuestion').textContent=`Final score: ${player.score||0}`; $('studentAnswerGrid').innerHTML=''; $('studentResult').textContent=''; return; } if(room.phase==='countdown'){ $('studentPhase').textContent='Get ready'; $('studentMedia').innerHTML=''; $('studentQuestion').textContent='Next question starting'; $('studentAnswerGrid').innerHTML=''; $('studentResult').textContent=''; return; } const q=room.quiz.questions[room.currentQ]; if(!q) return; $('studentQuestion').textContent=q.text||''; $('studentMedia').innerHTML=''; if(q.media){ if(q.media.type==='video') $('studentMedia').innerHTML=`<video src="${q.media.dataUrl}" ${room.phase==='question_media'?'autoplay controls':''}></video>`; else $('studentMedia').innerHTML=`<img src="${q.media.dataUrl}" alt="">`; } if(room.phase==='question_media'){ $('studentPhase').textContent='Watch the question'; $('studentAnswerGrid').innerHTML=''; $('studentResult').textContent=''; return; } const answers=nonBlankAnswers(q); $('studentPhase').textContent=room.phase==='paused'?'Question paused':room.phase==='locked'?'Time is up — waiting for results…':room.phase==='answer_results'?(player.lastCorrect?'Correct answer revealed':'Answer revealed'):'Choose your answer'; $('studentAnswerGrid').innerHTML=answers.map((a,idx)=>`<button type="button" class="student-answer ${answerColors[idx%4]} ${(player.answerQ===room.currentQ&&player.currentAnswerIndex===a.index)?'selected':''} ${room.phase!=='question_answers'?'locked':''}" data-answer-index="${a.index}">${a.media?`<span class="thumb">${a.media.type==='video'?`<video src="${a.media.dataUrl}" muted></video>`:`<img src="${a.media.dataUrl}">`}</span>`:''}${a.text?`<span>${esc(a.text)}</span>`:''}</button>`).join(''); $('studentAnswerGrid').querySelectorAll('[data-answer-index]').forEach(btn=>btn.onclick=async()=>{ if(room.phase!=='question_answers') return; const idx=parseInt(btn.dataset.answerIndex,10); await roomRef(room.code).child('players').child(studentPlayerId).update({currentAnswerIndex:idx,answerAt:Date.now(),answerQ:room.currentQ}); }); $('studentResult').textContent=room.phase==='answer_results'?((player.lastDelta?'+'+player.lastDelta+' ':'')+(player.streakMsg||'')):''; }

function stopPreviewMode(){ previewMode = false; }
function buildPreviewRoom(){
  saveQuestionForm();
  return {
    code:'PREVIEW',
    hostUid: currentTeacher ? currentTeacher.uid : '',
    hostName: currentTeacher ? (currentTeacher.displayName || currentTeacher.email || 'Teacher') : 'Teacher',
    quiz: clone(editorQuiz),
    currentQ: 0,
    phase: 'lobby',
    currentQuestionEndsAt: 0,
    currentRemainingMs: 0,
    paused: false,
    players: {},
    updatedAt: Date.now()
  };
}
function startPreviewHost(){
  if(!editorQuiz) return;
  cleanupHost();
  previewMode = true;
  hostRoom = buildPreviewRoom();
  showScreen('host-screen');
  renderHost();
}
function previewStartQuiz(){
  if(!hostRoom) return;
  previewMode = true;
  hostRoom.phase = 'countdown';
  hostRoom.updatedAt = Date.now();
  renderHost();
}
function previewBeginAnswerPhase(){
  const q = hostRoom.quiz.questions[hostRoom.currentQ];
  hostRoom.phase = 'question_answers';
  hostRoom.paused = false;
  hostRoom.currentRemainingMs = 0;
  hostRoom.currentQuestionEndsAt = Date.now() + ((q.seconds || 20) * 1000);
  hostRoom.updatedAt = Date.now();
  renderHost();
}
function previewLockQuestion(){
  hostRoom.phase = 'locked';
  hostRoom.paused = false;
  hostRoom.currentRemainingMs = 0;
  hostRoom.updatedAt = Date.now();
  renderHost();
}
function previewPauseQuestion(){
  if(!hostRoom || hostRoom.phase !== 'question_answers') return;
  hostRoom.phase = 'paused';
  hostRoom.paused = true;
  hostRoom.currentRemainingMs = Math.max(0, (hostRoom.currentQuestionEndsAt || 0) - Date.now());
  hostRoom.updatedAt = Date.now();
  renderHost();
}
function previewResumeQuestion(){
  if(!hostRoom || hostRoom.phase !== 'paused') return;
  hostRoom.phase = 'question_answers';
  hostRoom.paused = false;
  hostRoom.currentQuestionEndsAt = Date.now() + (hostRoom.currentRemainingMs || 0);
  hostRoom.updatedAt = Date.now();
  renderHost();
}
function previewShowResults(){
  if(!hostRoom || hostRoom.phase !== 'locked') return;
  hostRoom.phase = 'answer_results';
  hostRoom.updatedAt = Date.now();
  renderHost();
  if(revealHandle) clearTimeout(revealHandle);
  revealHandle = setTimeout(() => {
    if(hostRoom && hostRoom.phase === 'answer_results'){
      hostRoom.phase = 'leaderboard';
      hostRoom.updatedAt = Date.now();
      renderLeaderboard();
    }
  }, 1200);
}
function previewNextQuestion(){
  if(!hostRoom) return;
  const next = (hostRoom.currentQ || 0) + 1;
  if(next >= (hostRoom.quiz.questions || []).length){
    hostRoom.phase = 'final';
    hostRoom.updatedAt = Date.now();
    renderFinal();
    return;
  }
  hostRoom.currentQ = next;
  hostRoom.phase = 'countdown';
  hostRoom.paused = false;
  hostRoom.currentRemainingMs = 0;
  hostRoom.currentQuestionEndsAt = 0;
  hostRoom.updatedAt = Date.now();
  showScreen('host-screen');
  renderHost();
}
function previewEndGame(){
  cleanupHost();
  hostRoom = null;
  stopPreviewMode();
  showScreen('editor-screen');
}

function bindEvents(){ $('googleLoginBtn').onclick=signInTeacher; $('logoutBtn').onclick=logoutTeacher; $('newFolderBtn').onclick=()=>openFolderModal('new'); $('folderModalCancel').onclick=closeFolderModal; $('folderModalSave').onclick=commitFolderModal; $('moveQuizCancel').onclick=closeMoveQuizModal; $('newQuizBtn').onclick=createNewQuiz; $('editorBackBtn').onclick=async()=>{ await loadQuizzes(); showScreen('library-screen'); }; $('previewQuizBtn').onclick=startPreviewHost; $('saveQuizBtn').onclick=saveQuiz; $('addQuestionBtn').onclick=addQuestion; $('deleteQuestionBtn').onclick=deleteCurrentQuestion; $('clearCoverBtn').onclick=clearCover; $('clearQuestionMediaBtn').onclick=clearQuestionMedia; $('startQuizBtn').onclick=()=>{ if(previewMode) previewStartQuiz(); else startQuiz(); }; $('pauseBtn').onclick=()=>{ if(previewMode) previewPauseQuestion(); else pauseQuestion(); }; $('resumeBtn').onclick=()=>{ if(previewMode) previewResumeQuestion(); else resumeQuestion(); }; $('showResultsBtn').onclick=()=>{ if(previewMode) previewShowResults(); else showResults(); }; $('nextQuestionBtn').onclick=()=>{ if(previewMode) previewNextQuestion(); else nextQuestion(); }; $('leaderboardNextBtn').onclick=()=>{ if(previewMode) previewNextQuestion(); else nextQuestion(); }; $('leaderboardEndBtn').onclick=()=>{ if(previewMode) previewEndGame(); else endGame(); }; $('endLobbyBtn').onclick=()=>{ if(previewMode) previewEndGame(); else endGame(); }; $('endGameBtn').onclick=()=>{ if(previewMode) previewEndGame(); else endGame(); }; $('finalLibraryBtn').onclick=()=>{ if(previewMode) previewEndGame(); else endHostToLibrary(true); }; $('searchInput').oninput=e=>{ searchTerm=e.target.value||''; renderLibrary(); }; $('studentJoinBtn').onclick=studentJoin; $('studentCode').onkeydown=e=>{ if(e.key==='Enter') studentJoin(); }; $('studentName').onkeydown=e=>{ if(e.key==='Enter') studentJoin(); }; bindDropZone('coverDrop','coverInput', file=>readDataUrl(file,data=>{ editorQuiz.cover=data; renderCoverPreview(); })); bindDropZone('questionMediaDrop','questionMediaInput', file=>{ readDataUrl(file,data=>{ currentQuestion().media={type:file.type.startsWith('video/')?'video':'image',dataUrl:data}; renderQuestionMediaPreview(currentQuestion().media); }); }); }
document.addEventListener('DOMContentLoaded',()=>{ bindEvents(); if(maybeBootStudentMode()) setBootComplete(); });
</script>
